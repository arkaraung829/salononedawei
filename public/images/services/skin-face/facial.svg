<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0FA"/>
      <stop offset="100%" style="stop-color:#E8DCF0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="40%">
      <stop offset="0%" style="stop-color:#9B7CB8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#9B7CB8;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="276" rx="270" ry="220" fill="url(#glow)"/>
  <!-- Face outline with spa elements -->
  <g transform="translate(400,265)" stroke="#9B7CB8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Face oval -->
    <ellipse cx="0" cy="-10" rx="30" ry="40"/>
    <!-- Eyes (closed, relaxed) -->
    <path d="M-15-18 Q-10-22-5-18" stroke-width="2"/>
    <path d="M5-18 Q10-22 15-18" stroke-width="2"/>
    <!-- Serene smile -->
    <path d="M-8 5 Q0 10 8 5" stroke-width="2"/>
    <!-- Cucumber slices on eyes (optional decorative circles) -->
    <circle cx="-10" cy="-20" r="8" fill="#9B7CB8" opacity="0.08" stroke="none"/>
    <circle cx="10" cy="-20" r="8" fill="#9B7CB8" opacity="0.08" stroke="none"/>
    <!-- Sparkle accents -->
    <g stroke-width="1.5" opacity="0.3">
      <line x1="40" y1="-30" x2="40" y2="-38"/>
      <line x1="36" y1="-34" x2="44" y2="-34"/>
      <line x1="-42" y1="-25" x2="-42" y2="-33"/>
      <line x1="-46" y1="-29" x2="-38" y2="-29"/>
      <line x1="35" y1="10" x2="35" y2="18"/>
      <line x1="31" y1="14" x2="39" y2="14"/>
    </g>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Facial</text>
</svg>