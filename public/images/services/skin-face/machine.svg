<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0E8F5"/>
      <stop offset="100%" style="stop-color:#E0D0EB"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="38%">
      <stop offset="0%" style="stop-color:#8B6BA8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8B6BA8;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="288" rx="260" ry="210" fill="url(#glow)"/>
  <!-- Skin treatment device icon -->
  <g transform="translate(400,262)" stroke="#8B6BA8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Device body -->
    <rect x="-12" y="-15" width="24" height="55" rx="10"/>
    <!-- Device head -->
    <circle cx="0" cy="-25" r="15"/>
    <!-- Circular detail on head -->
    <circle cx="0" cy="-25" r="8" stroke-width="1.5" opacity="0.5"/>
    <!-- Emission lines -->
    <path d="M-22-30 Q-30-25-22-20" stroke-width="1.5" opacity="0.3"/>
    <path d="M-26-33 Q-36-25-26-17" stroke-width="1.5" opacity="0.2"/>
    <path d="M22-30 Q30-25 22-20" stroke-width="1.5" opacity="0.3"/>
    <path d="M26-33 Q36-25 26-17" stroke-width="1.5" opacity="0.2"/>
    <!-- Button -->
    <circle cx="0" cy="10" r="3" fill="#8B6BA8" opacity="0.2"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Machine Treatment</text>
</svg>