<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D5EDE5"/>
      <stop offset="100%" style="stop-color:#F0F8F5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="42%">
      <stop offset="0%" style="stop-color:#6BA893;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6BA893;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="270" ry="220" fill="url(#glow)"/>
  <!-- Scrub jar with salt/sugar grains -->
  <g transform="translate(400,262)" stroke="#6BA893" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Jar body -->
    <rect x="-30" y="-15" width="60" height="45" rx="8" fill="#6BA893" opacity="0.06"/>
    <rect x="-30" y="-15" width="60" height="45" rx="8"/>
    <!-- Jar lid -->
    <rect x="-32" y="-25" width="64" height="12" rx="4"/>
    <!-- Scrub texture dots -->
    <g fill="#6BA893" opacity="0.2" stroke="none">
      <circle cx="-15" cy="5" r="2.5"/>
      <circle cx="-5" cy="0" r="2"/>
      <circle cx="8" cy="8" r="2.5"/>
      <circle cx="18" cy="2" r="2"/>
      <circle cx="-8" cy="15" r="2"/>
      <circle cx="5" cy="18" r="2.5"/>
      <circle cx="15" cy="15" r="2"/>
      <circle cx="-18" cy="18" r="2"/>
    </g>
    <!-- Leaf decoration -->
    <path d="M35-30 Q45-45 55-30 Q45-15 35-30Z" fill="#6BA893" opacity="0.12" stroke-width="1.5"/>
    <line x1="45" y1="-38" x2="45" y2="-22" stroke-width="1" opacity="0.2"/>
  </g>
  <text x="400" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Body Scrub</text>
</svg>