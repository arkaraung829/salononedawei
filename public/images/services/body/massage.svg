<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF8F5"/>
      <stop offset="100%" style="stop-color:#D5EDE5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="40%">
      <stop offset="0%" style="stop-color:#6BA893;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#6BA893;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="276" rx="270" ry="220" fill="url(#glow)"/>
  <!-- Massage hands icon -->
  <g transform="translate(400,265)" stroke="#6BA893" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Two hands pressing -->
    <path d="M-35-10 Q-20-30 0-20 Q20-30 35-10"/>
    <path d="M-35-10 Q-45 0-40 10 Q-35 20-20 15 Q-10 10 0 15 Q10 10 20 15 Q35 20 40 10 Q45 0 35-10"/>
    <!-- Pressure lines -->
    <line x1="0" y1="20" x2="0" y2="30" stroke-width="1.5" opacity="0.3"/>
    <line x1="-15" y1="22" x2="-15" y2="30" stroke-width="1.5" opacity="0.25"/>
    <line x1="15" y1="22" x2="15" y2="30" stroke-width="1.5" opacity="0.25"/>
    <!-- Leaf accents -->
    <path d="M-45-35 Q-35-45-25-35 Q-35-25-45-35Z" fill="#6BA893" opacity="0.15" stroke-width="1.5"/>
    <path d="M40-30 Q50-40 60-30 Q50-20 40-30Z" fill="#6BA893" opacity="0.12" stroke-width="1.5"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Massage</text>
</svg>