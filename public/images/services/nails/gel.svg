<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5DDE1"/>
      <stop offset="100%" style="stop-color:#FDF5F6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="38%">
      <stop offset="0%" style="stop-color:#D4848C;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D4848C;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="288" rx="260" ry="210" fill="url(#glow)"/>
  <!-- UV lamp icon -->
  <g transform="translate(400,260)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lamp body -->
    <path d="M-40 20 L-35-20 Q-30-35 0-35 Q30-35 35-20 L40 20Z" fill="#D4848C" opacity="0.08"/>
    <path d="M-40 20 L-35-20 Q-30-35 0-35 Q30-35 35-20 L40 20"/>
    <!-- Base -->
    <rect x="-45" y="20" width="90" height="10" rx="3"/>
    <!-- UV rays inside -->
    <line x1="-15" y1="-15" x2="-15" y2="10" stroke-width="1.5" opacity="0.3" stroke="#D4848C"/>
    <line x1="0" y1="-20" x2="0" y2="10" stroke-width="1.5" opacity="0.3" stroke="#D4848C"/>
    <line x1="15" y1="-15" x2="15" y2="10" stroke-width="1.5" opacity="0.3" stroke="#D4848C"/>
    <!-- Fingertips under lamp -->
    <ellipse cx="-12" cy="15" rx="4" ry="6" fill="#D4848C" opacity="0.2" stroke="none"/>
    <ellipse cx="0" cy="14" rx="4" ry="7" fill="#D4848C" opacity="0.2" stroke="none"/>
    <ellipse cx="12" cy="15" rx="4" ry="6" fill="#D4848C" opacity="0.2" stroke="none"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Gel Nails</text>
</svg>