<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF5F6"/>
      <stop offset="100%" style="stop-color:#F0D5DA"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="270" rx="260" ry="220" fill="url(#glow)"/>
  <!-- Nail file and nail tip icon -->
  <g transform="translate(400,265)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Nail tip -->
    <path d="M-20-10 Q-20-40 0-50 Q20-40 20-10 Z" fill="#D4848C" opacity="0.15"/>
    <path d="M-20-10 Q-20-40 0-50 Q20-40 20-10"/>
    <!-- Nail file -->
    <rect x="-35" y="8" width="70" height="12" rx="2" transform="rotate(-15 0 14)"/>
    <line x1="-25" y1="14" x2="25" y2="6" stroke-width="1" opacity="0.3" transform="rotate(-15 0 14)"/>
    <!-- Sparkle accents -->
    <g stroke-width="1.5" opacity="0.4">
      <line x1="30" y1="-35" x2="30" y2="-45"/>
      <line x1="25" y1="-40" x2="35" y2="-40"/>
      <line x1="-35" y1="-25" x2="-35" y2="-33"/>
      <line x1="-39" y1="-29" x2="-31" y2="-29"/>
    </g>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Acrylic Nails</text>
</svg>