    <line x1="15" y1="-38" x2="15" y2="-52" stroke-width="2"/>
    <line x1="-22" y1="-30" x2="-22" y2="-44" stroke-width="2"/>
    <line x1="22" y1="-30" x2="22" y2="-44" stroke-width="2"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Hair Styling</text>
