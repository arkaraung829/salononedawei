<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2"/>
      <stop offset="50%" style="stop-color:#F0E6D6"/>
      <stop offset="100%" style="stop-color:#E8D5B8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="300" rx="260" ry="220" fill="url(#glow)"/>
  <!-- Hair dye brush icon -->
  <g transform="translate(400,270)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-15" y="-55" width="30" height="45" rx="4"/>
    <path d="M-15-10 L-15 20 Q-15 30 0 30 Q15 30 15 20 L15-10"/>
    <line x1="-8" y1="-40" x2="8" y2="-40"/>
    <line x1="-8" y1="-30" x2="8" y2="-30"/>
    <!-- Color drops -->
    <circle cx="-30" cy="10" r="5" fill="#C9A96E" opacity="0.3"/>
    <circle cx="32" cy="-5" r="4" fill="#C9A96E" opacity="0.2"/>
    <circle cx="-25" cy="25" r="3" fill="#C9A96E" opacity="0.25"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Hair Coloring</text>
</svg>