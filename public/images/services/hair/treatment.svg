<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2"/>
      <stop offset="100%" style="stop-color:#E8D8C0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="288" rx="260" ry="220" fill="url(#glow)"/>
  <!-- Treatment bottle with droplet -->
  <g transform="translate(400,265)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottle -->
    <rect x="-20" y="-25" width="40" height="55" rx="6"/>
    <rect x="-10" y="-40" width="20" height="18" rx="3"/>
    <rect x="-6" y="-48" width="12" height="10" rx="2"/>
    <!-- Droplet -->
    <path d="M0 45 Q-10 55-10 62 Q-10 72 0 72 Q10 72 10 62 Q10 55 0 45Z" fill="#C9A96E" opacity="0.2" stroke="#C9A96E"/>
    <!-- Shine line -->
    <line x1="-12" y1="-15" x2="-12" y2="15" stroke-width="1.5" opacity="0.3"/>
  </g>
  <text x="400" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Hair Treatment</text>
</svg>