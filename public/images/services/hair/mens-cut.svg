    <rect x="-18" y="-50" width="36" height="60" rx="6"/>
    <rect x="-14" y="10" width="28" height="35" rx="3"/>
    <line x1="-10" y1="-35" x2="10" y2="-35"/>
    <line x1="-10" y1="-25" x2="10" y2="-25"/>
    <line x1="-8" y1="18" x2="8" y2="18"/>
    <line x1="-8" y1="26" x2="8" y2="26"/>
    <line x1="-8" y1="34" x2="8" y2="34"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Men's Cut</text>
</svg>