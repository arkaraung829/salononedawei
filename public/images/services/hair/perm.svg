<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#F5EDE0"/>
      <stop offset="100%" style="stop-color:#FAF7F2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="42%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="270" rx="280" ry="230" fill="url(#glow)"/>
  <!-- Curling rod / perm rod icon with wavy hair -->
  <g transform="translate(400,265)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Perm rod -->
    <rect x="-8" y="-45" width="16" height="50" rx="8" stroke-width="2.5"/>
    <line x1="-8" y1="-30" x2="8" y2="-30" stroke-width="1.5"/>
    <line x1="-8" y1="-15" x2="8" y2="-15" stroke-width="1.5"/>
    <!-- Wavy hair strands -->
    <path d="M-40-30 Q-30-45-40-55 Q-50-65-40-75" stroke-width="2" opacity="0.5"/>
    <path d="M-55-20 Q-45-35-55-45 Q-65-55-55-65" stroke-width="2" opacity="0.4"/>
    <path d="M40-30 Q50-45 40-55 Q30-65 40-75" stroke-width="2" opacity="0.5"/>
    <path d="M55-20 Q65-35 55-45 Q45-55 55-65" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D2D2D" opacity="0.5">Perm</text>
</svg>