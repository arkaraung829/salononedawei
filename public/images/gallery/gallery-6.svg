<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F0E6D6"/>
      <stop offset="100%" style="stop-color:#FAF7F2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="40%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="380" rx="280" ry="280" fill="url(#glow)"/>
  <!-- Spa candle and towel -->
  <g transform="translate(400,365)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Candle -->
    <rect x="-10" y="-20" width="20" height="35" rx="3" fill="#C9A96E" opacity="0.06"/>
    <rect x="-10" y="-20" width="20" height="35" rx="3"/>
    <path d="M0-20 L0-28 Q-4-35 0-40 Q4-35 0-28" fill="#C9A96E" opacity="0.2"/>
    <!-- Rolled towel -->
    <ellipse cx="-35" cy="10" rx="15" ry="8" fill="#C9A96E" opacity="0.05"/>
    <ellipse cx="-35" cy="10" rx="15" ry="8"/>
    <path d="M-50 10 L-50 18 Q-50 25-35 25 Q-20 25-20 18 L-20 10"/>
    <!-- Leaf -->
    <path d="M25-10 Q35-22 45-10 Q35 2 25-10Z" fill="#6BA893" opacity="0.1" stroke="#6BA893" stroke-width="1.5"/>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2D2D2D" opacity="0.4">Spa Ambiance</text>
</svg>