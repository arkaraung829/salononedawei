<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2F4"/>
      <stop offset="100%" style="stop-color:#EEDCE0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" style="stop-color:#D4848C;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#D4848C;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="380" rx="280" ry="280" fill="url(#glow)"/>
  <!-- Decorated nail with gems -->
  <g transform="translate(400,360)" stroke="#C9A96E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-22 0 Q-22-38 0-50 Q22-38 22 0Z" fill="#D4848C" opacity="0.08"/>
    <path d="M-22 0 Q-22-38 0-50 Q22-38 22 0"/>
    <!-- Gem decorations -->
    <polygon points="0,-32 3,-28 0,-24 -3,-28" fill="#C9A96E" opacity="0.4" stroke="none"/>
    <circle cx="-10" cy="-20" r="3" fill="#C9A96E" opacity="0.25" stroke="none"/>
    <circle cx="10" cy="-22" r="3" fill="#D4848C" opacity="0.3" stroke="none"/>
    <circle cx="0" cy="-15" r="2" fill="#C9A96E" opacity="0.3" stroke="none"/>
    <circle cx="-6" cy="-8" r="2.5" fill="#D4848C" opacity="0.2" stroke="none"/>
    <circle cx="6" cy="-10" r="2" fill="#C9A96E" opacity="0.2" stroke="none"/>
    <!-- Sparkles -->
    <g stroke-width="1.5" opacity="0.35">
      <line x1="30" y1="-42" x2="30" y2="-50"/><line x1="26" y1="-46" x2="34" y2="-46"/>
      <line x1="-28" y1="-35" x2="-28" y2="-41"/><line x1="-31" y1="-38" x2="-25" y2="-38"/>
      <line x1="25" y1="-10" x2="25" y2="-16"/><line x1="22" y1="-13" x2="28" y2="-13"/>
    </g>
  </g>
  <text x="400" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2D2D2D" opacity="0.4">Nail Design</text>
</svg>