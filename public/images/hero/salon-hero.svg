<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="50%" style="stop-color:#4A3F35"/>
      <stop offset="100%" style="stop-color:#6B5B4E"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#C9A96E;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#C9A96E;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#heroBg)"/>
  <ellipse cx="960" cy="540" rx="700" ry="500" fill="url(#heroGlow)"/>
  <!-- Decorative circles -->
  <circle cx="300" cy="200" r="120" fill="#C9A96E" opacity="0.05"/>
  <circle cx="1600" cy="300" r="180" fill="#C9A96E" opacity="0.04"/>
  <circle cx="500" cy="800" r="150" fill="#F0E6D6" opacity="0.03"/>
  <circle cx="1400" cy="850" r="100" fill="#C9A96E" opacity="0.06"/>
  <!-- Abstract flowing lines -->
  <path d="M0 600 Q480 400 960 550 Q1440 700 1920 500" stroke="#C9A96E" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M0 650 Q480 450 960 600 Q1440 750 1920 550" stroke="#C9A96E" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M0 700 Q480 500 960 650 Q1440 800 1920 600" stroke="#F0E6D6" stroke-width="0.8" fill="none" opacity="0.1"/>
  <!-- Central scissors icon -->
  <g transform="translate(960,540) scale(3)" opacity="0.15">
    <path d="M-20-30 C-20-20-10-10 0 0 C10-10 20-20 20-30" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <path d="M-20 30 C-20 20-10 10 0 0 C10 10 20 20 20 30" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <circle cx="-20" cy="-30" r="8" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <circle cx="-20" cy="30" r="8" stroke="#C9A96E" stroke-width="2" fill="none"/>
  </g>
  <!-- Decorative dots pattern -->
  <g opacity="0.08" fill="#C9A96E">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="100" r="3"/><circle cx="300" cy="100" r="3"/>
    <circle cx="100" cy="200" r="3"/><circle cx="200" cy="200" r="3"/><circle cx="300" cy="200" r="3"/>
    <circle cx="1620" cy="880" r="3"/><circle cx="1720" cy="880" r="3"/><circle cx="1820" cy="880" r="3"/>
    <circle cx="1620" cy="980" r="3"/><circle cx="1720" cy="980" r="3"/><circle cx="1820" cy="980" r="3"/>
  </g>
  <!-- Horizontal gold accent line -->
  <rect x="660" y="538" width="600" height="2" fill="url(#goldShine)" rx="1"/>
</svg>